# print service URLs
- name: Get public IP
  ansible.builtin.uri:
    url: http://ifconfig.me/ip
    return_content: yes
  register: public_ip

- name: Create service URL table
  set_fact:
    service_urls:
      - { name: "MinIO", url: "http://{{ public_ip.content | trim }}:9000" }
      - { name: "MLflow", url: "http://{{ public_ip.content | trim }}:5000" }
      - {
          name: "F-Droid Server",
          url: "http://{{ public_ip.content | trim }}:8666",
        }
      - { name: "Harbor", url: "http://{{ public_ip.content | trim }}:8083" }
      - {
          name: "Prometheus",
          url: "http://{{ public_ip.content | trim }}:9090",
        }
      - { name: "Grafana", url: "http://{{ public_ip.content | trim }}:3000" }

